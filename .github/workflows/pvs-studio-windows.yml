name: PVS-Studio Static Analysis

on: workflow_dispatch

jobs:
  build-analyze:
    runs-on: windows-latest
    
    steps:
      - name: Check Out Repository Code
        uses: actions/checkout@v6.0.2
      
      - name: Install .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '8.0.x'

      - name: Install PVS-Studio
        shell: pwsh
        run: |
          choco install pvs-studio -y

      - name: Activate PVS-Studio License
        env:
          USERNAME: ${{ secrets.PVS_NAME }}
          KEY: ${{ secrets.PVS_KEY }}
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\PVS-Studio\PVS-Studio_Cmd.exe" credentials --userName "$env:USERNAME" --licenseKey "$env:KEY"

      - name: Analyze Solution
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\PVS-Studio_Cmd.exe" -t .\Bank.sln -r .\pvs-report.json -o .\pvs-report.plog
